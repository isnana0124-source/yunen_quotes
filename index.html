<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云恩管理顧問｜報價單管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  /* LOGO 主色系 */
  --blue:      #1e78b4;
  --blue-dk:   #155d8c;
  --blue-lt:   #e8f4fb;
  --blue-md:   #bddcf0;
  --green:     #78d23c;
  --green-dk:  #5aaa28;
  --green-lt:  #edf9e2;
  --green-md:  #c5ecaa;
  /* 中性色 */
  --ink:       #1a2a38;
  --ink2:      #3a5068;
  --ink3:      #7a90a0;
  --paper:     #f5f9fc;
  --paper2:    #eaf2f8;
  --paper3:    #d8eaf4;
  --white:     #ffffff;
  --border:    #c8dcea;
  --shadow:    0 2px 12px rgba(30,120,180,.10), 0 6px 24px rgba(30,120,180,.07);
  --shadow-lg: 0 8px 32px rgba(30,120,180,.14), 0 20px 56px rgba(30,120,180,.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;font-size:14px;}

/* ── Header ── */
header{background:linear-gradient(135deg,var(--blue-dk) 0%,var(--blue) 60%,#2a8fcc 100%);padding:0 28px;height:68px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(30,120,180,.25);}
.logo-area{display:flex;align-items:center;gap:12px;}
.logo-img{width:44px;height:44px;border-radius:8px;background:#fff;padding:4px;object-fit:contain;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.logo-text h1{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:900;color:#fff;letter-spacing:.06em;}
.logo-text p{font-size:10px;color:rgba(255,255,255,.65);letter-spacing:.18em;text-transform:uppercase;margin-top:1px;}
.hd-right{display:flex;align-items:center;gap:10px;}
.btn{padding:8px 18px;border-radius:5px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans TC',sans-serif;transition:all .15s;letter-spacing:.03em;}
.btn-green{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(120,210,60,.35);}
.btn-green:hover{background:var(--green-dk);transform:translateY(-1px);box-shadow:0 4px 14px rgba(120,210,60,.4);}
.btn-outline-w{background:none;border:1.5px solid rgba(255,255,255,.4);color:rgba(255,255,255,.9);}
.btn-outline-w:hover{border-color:#fff;color:#fff;background:rgba(255,255,255,.1);}
.btn-ghost{background:none;border:1.5px solid var(--border);color:var(--ink2);}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:var(--blue-dk);}
.btn-danger{background:none;border:1.5px solid #e05555;color:#e05555;}
.btn-danger:hover{background:#fef2f2;}
.btn-sm{padding:6px 14px;font-size:12px;}
.btn-xs{padding:3px 9px;font-size:11px;}

/* ── App layout ── */
.app{display:grid;grid-template-columns:268px 1fr;min-height:calc(100vh - 68px);}

/* ── Sidebar ── */
.sidebar{background:var(--blue-dk);padding:16px 0;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.sidebar-section{padding:8px 18px 3px;font-size:10px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.18em;text-transform:uppercase;margin-top:10px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;transition:all .12s;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;border-left:3px solid transparent;border-radius:0 4px 4px 0;margin-right:8px;}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.08);}
.nav-item.active{color:#fff;background:rgba(120,210,60,.18);border-left-color:var(--green);}
.nav-item .ni-icon{width:20px;text-align:center;font-size:15px;flex-shrink:0;}
.nav-item .ni-badge{margin-left:auto;background:var(--green);color:#fff;border-radius:10px;padding:1px 8px;font-size:10px;font-weight:700;min-width:24px;text-align:center;}

/* ── Main ── */
.main-area{overflow:auto;}
.content{padding:26px 30px;}

/* ── Page header ── */
.page-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px;}
.page-hd-left h2{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;color:var(--ink);}
.page-hd-left p{font-size:13px;color:var(--ink3);margin-top:3px;}

/* ── Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px 18px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat-card.sc-blue::after{background:linear-gradient(90deg,var(--blue),#2a9fe0);}
.stat-card.sc-green::after{background:linear-gradient(90deg,var(--green),#9ae050);}
.stat-card.sc-gold::after{background:linear-gradient(90deg,#e8a020,#f0c040);}
.stat-card.sc-red::after{background:linear-gradient(90deg,#e05555,#f07070);}
.stat-label{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.12em;}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;color:var(--ink);margin-top:5px;line-height:1;}
.stat-sub{font-size:11px;color:var(--ink3);margin-top:4px;}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-box{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--border);border-radius:6px;padding:7px 12px;flex:1;max-width:300px;}
.search-box:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-lt);}
.search-box input{background:none;border:none;outline:none;font-size:13px;font-family:'Noto Sans TC',sans-serif;color:var(--ink);width:100%;}
.filter-tabs{display:flex;gap:4px;flex-wrap:wrap;}
.ftab{background:none;border:1.5px solid var(--border);border-radius:5px;padding:5px 13px;font-size:12px;font-weight:600;color:var(--ink3);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .12s;}
.ftab:hover{border-color:var(--blue);color:var(--blue);}
.ftab.active{background:var(--blue);border-color:var(--blue);color:#fff;}

/* ── Quote cards ── */
.quotes-grid{display:flex;flex-direction:column;gap:9px;}
.quote-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .14s;position:relative;}
.quote-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);border-color:var(--blue-md);}
.quote-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:8px 0 0 8px;background:var(--border);transition:background .14s;}
.quote-card:hover::before{background:var(--blue);}
.qc-no{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3);width:110px;flex-shrink:0;line-height:1.6;}
.qc-main{flex:1;min-width:0;}
.qc-client{font-weight:700;font-size:15px;color:var(--ink);}
.qc-title{font-size:12px;color:var(--ink3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qc-right{display:flex;align-items:center;gap:14px;flex-shrink:0;}
.qc-amount{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--blue);}
.qc-status{padding:3px 10px;border-radius:3px;font-size:11px;font-weight:700;white-space:nowrap;}
.st-draft{background:var(--paper2);color:var(--ink3);}
.st-sent{background:var(--blue-lt);color:var(--blue);}
.st-accepted{background:var(--green-lt);color:var(--green-dk);}
.st-rejected{background:#fef2f2;color:#e05555;}
.qc-actions{display:flex;gap:5px;flex-shrink:0;}

/* ── Detail view ── */
.view-back{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink3);cursor:pointer;margin-bottom:18px;width:fit-content;padding:6px 10px;border-radius:5px;transition:all .12s;}
.view-back:hover{color:var(--blue);background:var(--blue-lt);}
.view-back svg{width:15px;height:15px;}

/* ── Quote Document ── */
.quote-doc{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow-lg);}
.doc-hd{background:linear-gradient(135deg,var(--blue-dk),var(--blue) 55%,#2a9fe0);padding:26px 32px;display:flex;justify-content:space-between;align-items:center;gap:20px;}
.doc-hd-left{display:flex;align-items:center;gap:16px;}
.doc-logo{width:52px;height:52px;background:#fff;border-radius:10px;padding:5px;object-fit:contain;flex-shrink:0;}
.doc-company-name{font-family:'Noto Serif TC',serif;font-size:20px;font-weight:900;color:#fff;letter-spacing:.05em;}
.doc-company-info{font-size:11px;color:rgba(255,255,255,.65);margin-top:5px;line-height:1.8;}
.doc-badge{text-align:right;}
.doc-type{background:var(--green);color:#fff;padding:5px 16px;border-radius:4px;font-size:12px;font-weight:700;letter-spacing:.1em;display:inline-block;}
.doc-id{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.5);margin-top:6px;}

/* Meta grid */
.doc-meta{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
.meta-block{padding:18px 24px;border-right:1px solid var(--border);}
.meta-block:last-child{border-right:none;}
.meta-label{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--blue-lt);}
.meta-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:13px;}
.meta-row .mk{color:var(--ink3);width:60px;flex-shrink:0;font-size:12px;}
.meta-row .mv{color:var(--ink);font-weight:500;flex:1;}
.meta-row .mv input,.meta-row .mv select{background:var(--paper);border:1.5px solid var(--border);border-radius:4px;padding:4px 8px;color:var(--ink);font-size:13px;font-family:'Noto Sans TC',sans-serif;outline:none;width:100%;transition:all .12s;}
.meta-row .mv input:focus,.meta-row .mv select:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px var(--blue-lt);}

/* Items */
.items-area{padding:22px 24px;}
.section-hd{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.items-tbl{width:100%;border-collapse:collapse;margin-bottom:20px;}
.items-tbl th{background:var(--paper2);padding:8px 10px;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;text-align:left;border-bottom:2px solid var(--blue-md);}
.items-tbl th.r{text-align:right;}
.items-tbl td{padding:7px 10px;border-bottom:1px solid var(--paper3);font-size:13px;vertical-align:middle;}
.items-tbl tr:hover td{background:var(--paper);}
.items-tbl td input{background:none;border:none;outline:none;font-size:13px;font-family:'Noto Sans TC',sans-serif;color:var(--ink);width:100%;padding:1px 0;}
.items-tbl td input:focus{background:var(--blue-lt);border-radius:3px;padding:2px 4px;}
.items-tbl td.mono{font-family:'JetBrains Mono',monospace;font-size:12px;}
.items-tbl td.r{text-align:right;}
.items-tbl td.c{text-align:center;}
.items-tbl td.amt{color:var(--blue);font-weight:600;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;}
.items-tbl tr.sec-row td{background:linear-gradient(90deg,var(--blue-lt),var(--paper));font-weight:700;color:var(--blue);font-size:12px;padding:6px 10px;border-bottom:1px solid var(--blue-md);}
.del-btn{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:15px;padding:2px 5px;border-radius:3px;line-height:1;transition:all .1s;}
.del-btn:hover{color:#e05555;background:#fef2f2;}
.add-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border:1.5px dashed var(--border);border-radius:5px;background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--ink3);font-family:'Noto Sans TC',sans-serif;transition:all .12s;}
.add-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt);}

/* Totals */
.totals-wrap{display:flex;justify-content:flex-end;padding:0 24px 24px;}
.totals-box{min-width:260px;background:var(--paper);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.tot-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--paper3);}
.tot-row:last-child{border-bottom:none;background:linear-gradient(90deg,var(--blue-lt),var(--green-lt));}
.tot-lbl{font-size:13px;color:var(--ink3);}
.tot-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--ink);}
.tot-row.grand .tot-lbl{font-weight:700;color:var(--ink);font-size:14px;}
.tot-row.grand .tot-val{font-size:20px;color:var(--blue);}

/* Terms */
.terms-area{padding:18px 24px;border-top:1px solid var(--border);background:var(--paper);}
.terms-title{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:9px;}
.terms-list{list-style:none;display:flex;flex-direction:column;gap:4px;}
.terms-list li{font-size:11px;color:var(--ink2);line-height:1.6;padding-left:16px;position:relative;}
.terms-list li::before{content:'';position:absolute;left:4px;top:7px;width:5px;height:5px;background:var(--green);border-radius:50%;}

/* Signature */
.sig-area{padding:18px 24px;border-top:1px solid var(--border);display:flex;gap:16px;}
.sig-item{flex:1;border-top:2px solid var(--blue-md);padding-top:7px;font-size:11px;color:var(--ink3);}

/* ── Client Management ── */
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.client-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:18px 20px;cursor:pointer;transition:all .14s;position:relative;overflow:hidden;}
.client-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green);}
.client-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);border-color:var(--green-md);}
.cc-avatar{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0;margin-bottom:12px;}
.cc-name{font-size:15px;font-weight:700;color:var(--ink);}
.cc-contact{font-size:12px;color:var(--ink3);margin-top:3px;}
.cc-tel{font-size:12px;color:var(--blue);margin-top:2px;font-family:'JetBrains Mono',monospace;}
.cc-meta{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.cc-tag{background:var(--blue-lt);color:var(--blue);font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;}
.cc-qcount{background:var(--green-lt);color:var(--green-dk);font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;}
.cc-actions{display:flex;gap:6px;margin-top:12px;}

/* ── Modal ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(20,40,60,.45);z-index:300;backdrop-filter:blur(8px);align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:10px;width:540px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:26px;box-shadow:var(--shadow-lg);animation:mIn .2s ease;}
@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid var(--blue-lt);}
.modal-title{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;color:var(--blue);}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink3);border-radius:4px;padding:2px 6px;}
.modal-close:hover{background:var(--paper2);color:var(--ink);}
.form-fields{display:flex;flex-direction:column;gap:13px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.1em;}
.field input,.field select,.field textarea{background:var(--paper);border:1.5px solid var(--border);border-radius:5px;padding:9px 11px;color:var(--ink);font-size:13px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:all .12s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px var(--blue-lt);}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--paper3);}

/* ── Toast ── */
.toast{position:fixed;bottom:26px;right:26px;background:var(--blue-dk);color:#fff;padding:11px 20px;border-radius:7px;font-size:13px;font-weight:600;z-index:999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;border-left:4px solid var(--green);box-shadow:0 4px 20px rgba(30,120,180,.3);}
.toast.show{opacity:1;transform:none;}

/* ── Empty ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;color:var(--ink3);}
.empty-icon{font-size:52px;margin-bottom:14px;opacity:.4;}
.empty p{font-size:14px;margin-bottom:16px;}

/* ── Status bar ── */
.status-bar{display:flex;align-items:center;gap:10px;padding:12px 24px;background:var(--paper2);border-bottom:1px solid var(--border);}
.status-sel{background:none;border:1.5px solid var(--border);border-radius:4px;padding:5px 10px;font-size:12px;font-family:'Noto Sans TC',sans-serif;color:var(--ink);cursor:pointer;outline:none;}
.status-sel:focus{border-color:var(--blue);}

/* ── Print ── */
@media print{
  header,.sidebar,.toolbar,.page-hd,.page-hd-right,.qc-actions,.add-btn,.del-btn,.view-back,.status-bar,.overlay,.toast,.doc-toolbar{display:none!important;}
  .app{display:block;} body{background:#fff;font-size:12px;}
  .main-area{overflow:visible;}
  .content{padding:0;}
  .quote-doc{box-shadow:none;border:none;border-radius:0;}
  .doc-hd{-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:18px 24px;}
  .doc-hd *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .doc-company-name{font-size:16px!important;}
  .doc-company-info{font-size:10px!important;}
  .doc-meta{page-break-inside:avoid;}
  .meta-block{padding:12px 16px;}
  .items-area{padding:14px 16px;}
  .items-tbl th,.items-tbl td{padding:5px 8px;font-size:11px;}
  .totals-wrap{padding:0 16px 16px;}
  .terms-area{padding:12px 16px;}
  .sig-area{padding:12px 16px;}
  .print-stamp{display:flex!important;}
  .no-print{display:none!important;}
  @page{margin:12mm 10mm;size:A4;}
}
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{display:none}.stats-row{grid-template-columns:1fr 1fr}}
</style>

</head>
<body>

<!-- Header -->

// ── Load from Firestore ───────────────────────────────────────────
async function loadAll(){
  showLoading('連線 Firebase…');
  try {
    const [qSnap, cSnap, sDoc] = await Promise.all([
      getDocs(query(collection(db,'quotes'), orderBy('createdAt','desc'))),
      getDocs(collection(db,'clients')),
      getDoc(doc(db,'settings','main'))
    ]);
    quotes  = qSnap.docs.map(d=>d.data());
    clients = cSnap.docs.map(d=>d.data());
    if(sDoc.exists()) _settings = sDoc.data();
    if(quotes.length===0 && clients.length===0){
      showLoading('首次使用，寫入範例資料…');
      await seedClients();
      await seedQuotes();
    }
    hideLoading();
  } catch(e){
    hideLoading();
    alert('Firebase 連線失敗：'+e.message+'\n\n請確認 firebaseConfig 設定正確，且已在 Firestore 啟用資料庫。');
  }
}

function exportAll(){
  const blob=new Blob([JSON.stringify({quotes,clients},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='云恩備份_'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(a.href);
  toast('✅ 已匯出備份');
}

async function resetToDemo(){
  if(!confirm('確定要載入範例資料？\n（現有資料將被清除）')) return;
  showLoading('清除舊資料…');
  const [qSnap,cSnap]=await Promise.all([getDocs(collection(db,'quotes')),getDocs(collection(db,'clients'))]);
  await Promise.all([...qSnap.docs.map(d=>fsDel('quotes',d.id)),...cSnap.docs.map(d=>fsDel('clients',d.id))]);
  quotes=[]; clients=[];
  showLoading('寫入範例資料…');
  await seedClients();
  await seedQuotes();
  hideLoading();
  showView('list');
  toast('✅ 範例資料已載入');
}

// ── Utils ─────────────────────────────────────────────────────────
const $id = id => document.getElementById(id);
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function fmtN(n){ return n ? Number(n).toLocaleString('zh-TW') : '0'; }
function toast(msg){ const t=$id('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }
function openModal(id){ $id(id).classList.add('open'); }
function closeModal(id){ $id(id).classList.remove('open'); }
function calcQuote(q){
  let sub=0;
  (q.sections||[]).forEach(s=>(s.items||[]).forEach(i=>{ sub+=(parseFloat(i.price)||0)*(parseFloat(i.qty)||0); }));
  const tax=sub*(q.taxRate||0.05);
  return {sub, tax, total:sub+tax};
}
function statusClass(s){ return s==='草稿'?'st-draft':s==='已送出'?'st-sent':s==='已確認'?'st-accepted':'st-rejected'; }
function genId(){ const y=new Date().getFullYear(); const mx=quotes.filter(q=>q.id.startsWith(`QT-${y}-`)).reduce((m,q)=>Math.max(m,parseInt(q.id.split('-').pop())||0),0); return `QT-${y}-${String(mx+1).padStart(3,'0')}`; }
const COLORS=['#1e78b4','#78d23c','#e8a020','#e05555','#7c52c8','#0ea5a0','#e07020','#1e5a96'];

  ['list','clients','stats','settings'].forEach(n=>{
    $id(`nav-${n}`)?.classList.toggle('active', n===name);
  });
  if(name==='list') renderList();
  if(name==='clients'){ renderClients(); }
  if(name==='stats') renderStats();
  if(name==='settings') loadSettingsForm();
  updateBadges();
}

// ── Summary stats ─────────────────────────────────────────────────
function renderSummaryStats(){
  const tots=quotes.map(q=>calcQuote(q).total);
  const sum=tots.reduce((a,b)=>a+b,0);
  const acc=quotes.filter(q=>q.status==='已確認');
  const accSum=acc.reduce((s,q)=>s+calcQuote(q).total,0);
  $id('summaryStats').innerHTML=`
    <div class="stat-card sc-blue"><div class="stat-label">報價單總數</div><div class="stat-val">${quotes.length}</div><div class="stat-sub">所有報價</div></div>
    <div class="stat-card sc-gold"><div class="stat-label">報價總金額</div><div class="stat-val" style="font-size:16px">NT$${fmtN(Math.round(sum))}</div><div class="stat-sub">含稅合計</div></div>
    <div class="stat-card sc-green"><div class="stat-label">已確認訂單</div><div class="stat-val">${acc.length}</div><div class="stat-sub">NT$${fmtN(Math.round(accSum))}</div></div>
    <div class="stat-card sc-red"><div class="stat-label">待跟進</div><div class="stat-val">${quotes.filter(q=>q.status==='已送出').length}</div><div class="stat-sub">已送出未確認</div></div>
  `;
}

    if(q&&![qt.client||'',qt.title||'',qt.id||''].some(s=>s.toLowerCase().includes(q))) return false;
    return true;
  }).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  $id('listSubtitle').textContent=`共 ${rows.length} 份報價單`;
  const el=$id('quotesList');
  if(!rows.length){ el.innerHTML=`<div class="empty"><div class="empty-icon">📄</div><p>找不到報價單</p><button class="btn btn-green" onclick="openNewQuoteModal()">＋ 新增</button></div>`; return; }

  // 按客戶分組
  const groups={};
  const groupOrder=[];
  rows.forEach(qt=>{
    const key=qt.clientId||qt.client||'未分類';
    if(!groups[key]){ groups[key]={clientId:qt.clientId||null, clientName:qt.client||'未分類', quotes:[]}; groupOrder.push(key); }

  });

  el.innerHTML=groupOrder.map(key=>{
    const g=groups[key];
    const groupTotal=g.quotes.reduce((s,qt)=>s+calcQuote(qt).total,0);
    const accepted=g.quotes.filter(qt=>qt.status==='已接受').length;
    const COLORS_LOCAL=['#1e78b4','#78d23c','#e8a020','#e05555','#8b5cf6','#06b6d4','#f59e0b','#10b981'];
    const col=COLORS_LOCAL[groupOrder.indexOf(key)%COLORS_LOCAL.length];

      <div class="client-group-hd" style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border:1px solid var(--border);border-radius:8px 8px 0 0;border-bottom:2px solid ${col};cursor:pointer" onclick="this.parentElement.classList.toggle('collapsed')">
        <div style="width:32px;height:32px;border-radius:8px;background:${col};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:13px;flex-shrink:0">${initials}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:15px;color:var(--ink)">${g.clientName}</div>
          <div style="font-size:11px;color:var(--ink3);margin-top:1px">${g.quotes.length} 份報價　已接受 ${accepted} 份</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:${col}">NT$${fmtN(Math.round(groupTotal))}</div>
          <div style="font-size:10px;color:var(--ink3);margin-top:2px">合計（含稅）</div>
        </div>
        <div style="color:var(--ink3);font-size:13px;margin-left:6px;transition:transform .2s" class="grp-arrow">▾</div>
      </div>
      <div class="client-group-body" style="border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;overflow:hidden">
        ${g.quotes.map(qt=>{
          const {total}=calcQuote(qt);
          return `<div class="quote-card" onclick="openQuote('${qt.id}')" style="border-radius:0;border:none;border-bottom:1px solid var(--paper3)">
            <div class="qc-no">${qt.id}<br>${qt.date||''}</div>
            <div class="qc-main"><div class="qc-client" style="font-size:13px;color:var(--ink2)">${qt.title}</div></div>
            <div class="qc-right">
              <div class="qc-amount">NT$${fmtN(Math.round(total))}</div>
              <span class="qc-status ${statusClass(qt.status)}">${qt.status}</span>
            </div>
            <div class="qc-actions" onclick="event.stopPropagation()">
              <button class="btn btn-ghost btn-xs" onclick="dupeQuote('${qt.id}')">複製</button>
              <button class="btn btn-danger btn-xs" onclick="delQuote('${qt.id}')">刪除</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  // 折疊樣式
  document.querySelectorAll('.client-group.collapsed .client-group-body').forEach(el=>el.style.display='none');
  document.querySelectorAll('.client-group.collapsed .grp-arrow').forEach(el=>el.style.transform='rotate(-90deg)');
  document.querySelectorAll('.client-group-hd').forEach(hd=>{
    const obs=new MutationObserver(()=>{
      const c=hd.parentElement.classList.contains('collapsed');
      hd.parentElement.querySelector('.client-group-body').style.display=c?'none':'';
      hd.querySelector('.grp-arrow').style.transform=c?'rotate(-90deg)':'';
    });
    obs.observe(hd.parentElement,{attributes:true,attributeFilter:['class']});
  });
}

function saveClient(){
  const name=$id('cm-name').value.trim(); if(!name){ alert('請填寫公司名稱'); return; }
  const data={ name, short:$id('cm-short').value.trim(), contact:$id('cm-contact').value.trim(), title:$id('cm-title').value.trim(),
    tel:$id('cm-tel').value.trim(), fax:$id('cm-fax').value.trim(), addr:$id('cm-addr').value.trim(), email:$id('cm-email').value.trim(),
    taxid:$id('cm-taxid').value.trim(), industry:$id('cm-industry').value.trim(), note:$id('cm-note').value.trim() };
  let savedClient;
  if(editClientId){
    const idx=clients.findIndex(c=>c.id===editClientId);
    if(idx>=0){ clients[idx]={...clients[idx],...data}; savedClient=clients[idx]; }
    toast('✅ 客戶資料已更新');
  } else {
    savedClient={id:'cl-'+uid(), ...data, createdAt:new Date().toISOString()};
    clients.push(savedClient);
    toast('✅ 客戶已新增');
  }
  if(savedClient) saveClientFS(savedClient);
  closeModal('clientModal'); renderClients(); updateBadges();
}
function deleteClient(){
  if(!editClientId||!confirm('確定刪除此客戶？')) return;
  const _cid=editClientId; clients=clients.filter(c=>c.id!==editClientId);
  saveClients(); fsDel('clients',_cid); closeModal('clientModal'); renderClients(); toast('客戶已刪除');
}

    $id('nm-fax').value=c.fax||'';
    $id('nm-addr').value=c.addr||'';
    $id('nm-email').value=c.email||'';
  },50);
}

  if(!title){ alert('請填寫工程名稱'); return; }

    id:genId(), clientId:selId||null, client, clientContact:$id('nm-contact').value,
    clientTel:$id('nm-tel').value, clientFax:$id('nm-fax').value,
    clientAddr:$id('nm-addr').value, clientEmail:$id('nm-email').value,

}
async function delQuote(id){ if(!confirm(`確定刪除報價單 ${id}？`)) return; quotes=quotes.filter(q=>q.id!==id); saveQuotes(); await fsDel('quotes',id); if(currentQuoteId===id) showView('list'); else renderList(); updateBadges(); toast('報價單已刪除'); }
function dupeQuote(id){
  const o=quotes.find(q=>q.id===id); if(!o) return;
  const c=JSON.parse(JSON.stringify(o)); c.id=genId(); c.status='草稿'; c.date=new Date().toISOString().split('T')[0]; c.createdAt=new Date().toISOString();
  c.sections.forEach(s=>{ s.id=uid(); s.items.forEach(i=>i.id=uid()); });
  quotes.unshift(c); saveQuotes(); saveQuote(c); renderList(); toast(`✅ 已複製為 ${c.id}`);
}
function openQuote(id){ currentQuoteId=id; showView('detail'); renderQuoteDoc(); }

  $id('quoteDocWrap').innerHTML=`
    <div class="doc-toolbar" style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
      <div style="flex:1;min-width:200px">
        <div style="font-family:'Noto Serif TC',serif;font-size:20px;font-weight:700;color:var(--ink)">${q.client} — ${q.title}</div>
        <div style="font-size:12px;color:var(--ink3);margin-top:2px">${q.id} ｜ ${q.date||''}</div>
      </div>
      <select class="status-sel" onchange="updQField('status',this.value);toast('狀態已更新為「'+this.value+'」')">
        ${['草稿','已送出','已確認','未成交'].map(ss=>`<option${q.status===ss?' selected':''} >${ss}</option>`).join('')}
      </select>
      <button class="btn btn-ghost btn-sm" onclick="addSec()">＋ 新增分類</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleStamp()" id="stampToggleBtn">🔏 顯示印章</button>
      <button class="btn btn-green btn-sm" onclick="printQuote()">🖨 列印/PDF</button>
    </div>

    <div class="quote-doc">
      <div class="doc-hd">
        <div class="doc-hd-left">
          <img class="doc-logo" src="${LOGO_SRC}" alt="Logo">
          <div>
            <div class="doc-company-name">${s.name}</div>
            <div class="doc-company-info">
              地址：${s.addr}<br>
              統一編號：${s.taxid}　電話：${s.tel}　負責人：${s.contact}${s.email?'　Email：'+s.email:''}
            </div>
          </div>
        </div>
        <div class="doc-badge">
          <div class="doc-type">工程估價單</div>
          <div class="doc-id">${q.id}</div>
        </div>
      </div>

      <div class="doc-meta">
        <div class="meta-block">
          <div class="meta-label">客戶資訊</div>
          <div class="meta-row"><span class="mk">客戶名稱</span><span class="mv"><input value="${esc(q.client)}" onchange="updQField('client',this.value)"></span></div>
          <div class="meta-row"><span class="mk">聯絡人</span><span class="mv"><input value="${esc(q.clientContact||'')}" onchange="updQField('clientContact',this.value)"></span></div>
          <div class="meta-row"><span class="mk">電話</span><span class="mv"><input value="${esc(q.clientTel||'')}" onchange="updQField('clientTel',this.value)"></span></div>
          <div class="meta-row"><span class="mk">傳真</span><span class="mv"><input value="${esc(q.clientFax||'')}" onchange="updQField('clientFax',this.value)"></span></div>
          <div class="meta-row"><span class="mk">地址</span><span class="mv"><input value="${esc(q.clientAddr||'')}" onchange="updQField('clientAddr',this.value)"></span></div>
          <div class="meta-row"><span class="mk">Email</span><span class="mv"><input value="${esc(q.clientEmail||'')}" onchange="updQField('clientEmail',this.value)"></span></div>
        </div>
        <div class="meta-block">
          <div class="meta-label">報價資訊</div>
          <div class="meta-row"><span class="mk">工程名稱</span><span class="mv"><input value="${esc(q.title)}" onchange="updQField('title',this.value)"></span></div>
          <div class="meta-row"><span class="mk">報價日期</span><span class="mv"><input type="date" value="${q.date||''}" onchange="updQField('date',this.value)"></span></div>
          <div class="meta-row"><span class="mk">有效天數</span><span class="mv"><input type="number" value="${q.validity||30}" onchange="updQField('validity',this.value)" style="width:70px"> 天</span></div>
          <div class="meta-row"><span class="mk">報價編號</span><span class="mv" style="font-family:'JetBrains Mono',monospace;font-size:12px;padding:5px 0">${q.id}</span></div>
          <div class="meta-row"><span class="mk">狀態</span><span class="mv">
            <select onchange="updQField('status',this.value);toast('狀態已更新')">
              ${['草稿','已送出','已確認','未成交'].map(ss=>`<option${q.status===ss?' selected':''} >${ss}</option>`).join('')}
            </select>
          </span></div>
          <div class="meta-row"><span class="mk">備註</span><span class="mv"><input value="${esc(q.note||'')}" placeholder="備註" onchange="updQField('note',this.value)"></span></div>
        </div>
      </div>

      <div class="items-area">
        <div class="section-hd">📦 工程項目明細</div>
        <table class="items-tbl">
          <thead><tr>
            <th style="width:36px">項次</th><th>項目名稱</th><th>備註</th><th>規格</th>
            <th class="c" style="width:48px">單位</th><th class="r" style="width:110px">單價</th>

            <th style="width:28px"></th>
          </tr></thead>
          <tbody>${iHtml}</tbody>
        </table>
        <button class="add-btn" onclick="addSec()">＋ 新增工程分類</button>
      </div>

      <div class="totals-wrap">
        <div class="totals-box">
          <div class="tot-row"><span class="tot-lbl">小計</span><span class="tot-val" id="tot-sub">NT$${fmtN(Math.round(sub))}</span></div>
          <div class="tot-row"><span class="tot-lbl">營業稅（${((q.taxRate||0.05)*100).toFixed(0)}%）</span><span class="tot-val" id="tot-tax">NT$${fmtN(Math.round(tax))}</span></div>
          <div class="tot-row grand"><span class="tot-lbl">合計總額</span><span class="tot-val" id="tot-grand">NT$${fmtN(Math.round(total))}</span></div>
        </div>
      </div>

function esc(s){ return String(s||'')
  .replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updQField(f,v){ const q=quotes.find(x=>x.id===currentQuoteId); if(!q) return; q[f]=v; saveQuotes(); saveQuote(q); }
function updQFieldStatus(v){ updQField('status',v); toast(`狀態已更新為「${v}」`); }
function updSec(sid,f,v){ const q=quotes.find(x=>x.id===currentQuoteId); if(!q) return; const s=q.sections.find(x=>x.id===sid); if(!s) return; s[f]=v; saveQuotes(); saveQuote(q); }
function updItem(sid,iid,f,v){
  const q=quotes.find(x=>x.id===currentQuoteId); if(!q) return;
  const s=q.sections.find(x=>x.id===sid); if(!s) return;
  const item=s.items.find(x=>x.id===iid); if(!item) return;
  item[f]=(f==='price'||f==='qty')?parseFloat(v)||0:v;
  saveQuotes(); saveQuote(q);
  const amt=(parseFloat(item.price)||0)*(parseFloat(item.qty)||0);
  const el=$id(`amt-${iid}`); if(el) el.textContent=`NT$${fmtN(amt)}`;
  const {sub,tax,total}=calcQuote(q);
  const ts=$id('tot-sub'); if(ts) ts.textContent=`NT$${fmtN(Math.round(sub))}`;
  const tt=$id('tot-tax'); if(tt) tt.textContent=`NT$${fmtN(Math.round(tax))}`;
  const tg=$id('tot-grand'); if(tg) tg.textContent=`NT$${fmtN(Math.round(total))}`;
}
function addItem(sid){ const q=quotes.find(x=>x.id===currentQuoteId); if(!q) return; const s=q.sections.find(x=>x.id===sid); if(!s) return; s.items.push({id:uid(),name:'',note:'',spec:'',unit:'式',price:0,qty:1}); saveQuotes(); saveQuote(q); renderQuoteDoc(); }
function rmItem(sid,iid){ const q=quotes.find(x=>x.id===currentQuoteId); if(!q) return; const s=q.sections.find(x=>x.id===sid); if(!s) return; if(s.items.length<=1){ toast('每分類至少需一項'); return; } s.items=s.items.filter(i=>i.id!==iid); saveQuotes(); saveQuote(q); renderQuoteDoc(); }
function addSec(){ const q=quotes.find(x=>x.id===currentQuoteId); if(!q) return; q.sections.push({id:uid(),name:'新增分類',items:[{id:uid(),name:'',note:'',spec:'',unit:'式',price:0,qty:1}]}); saveQuotes(); saveQuote(q); renderQuoteDoc(); }
function rmSec(sid){ const q=quotes.find(x=>x.id===currentQuoteId); if(!q) return; if(q.sections.length<=1){ toast('至少需保留一個分類'); return; } if(!confirm('確定刪除此分類？')) return; q.sections=q.sections.filter(s=>s.id!==sid); saveQuotes(); saveQuote(q); renderQuoteDoc(); }

function printQuote(){ if(!currentQuoteId){ toast('請先開啟報價單'); return; } window.print(); }

// ── Stats ─────────────────────────────────────────────────────────
function renderStats(){
  const byStatus={};
  const byMonth={};
  const byClient={};
  quotes.forEach(q=>{
    byStatus[q.status]=(byStatus[q.status]||0)+1;
    const mo=(q.date||q.createdAt||'unknown').slice(0,7);
    if(!byMonth[mo]) byMonth[mo]={count:0,total:0};
    byMonth[mo].count++; byMonth[mo].total+=calcQuote(q).total;
    if(!byClient[q.client]) byClient[q.client]={count:0,total:0};
    byClient[q.client].count++; byClient[q.client].total+=calcQuote(q).total;
  });
  const sColors={'草稿':'var(--ink3)','已送出':'var(--blue)','已確認':'var(--green)','未成交':'#e05555'};
  const total=quotes.length||1;
  const stBars=Object.entries(byStatus).map(([st,cnt])=>{
    const pct=Math.round(cnt/total*100);
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px">
        <span style="font-weight:600">${st}</span>
        <span style="color:var(--ink3)">${cnt} 份 (${pct}%)</span>
      </div>
      <div style="height:10px;background:var(--paper3);border-radius:5px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${sColors[st]||'var(--blue)'};border-radius:5px"></div>
      </div>
    </div>`;
  }).join('');
  const months=Object.keys(byMonth).sort().slice(-6);
  const mRows=months.map(mo=>{const d=byMonth[mo]; return `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--paper3)">
      <span style="font-weight:600">${mo}</span>
      <span style="color:var(--ink3)">${d.count} 份</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--blue)">NT$${fmtN(Math.round(d.total))}</span>
    </div>`;}).join('');
  const topC=Object.entries(byClient).sort((a,b)=>b[1].total-a[1].total).slice(0,5).map(([cl,d])=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--paper3)">
      <span style="font-weight:600">${cl}</span>
      <span style="color:var(--ink3)">${d.count} 份</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--green-dk)">NT$${fmtN(Math.round(d.total))}</span>
    </div>`).join('');
  $id('statsContent').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
      <div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:22px;box-shadow:var(--shadow)">
        <h3 style="font-family:'Noto Serif TC',serif;font-size:15px;color:var(--blue);margin-bottom:16px">報價單狀態分佈</h3>${stBars}
      </div>
      <div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:22px;box-shadow:var(--shadow)">
        <h3 style="font-family:'Noto Serif TC',serif;font-size:15px;color:var(--blue);margin-bottom:16px">前五大客戶</h3>${topC||'<p style="color:var(--ink3)">暫無資料</p>'}
      </div>
      <div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:22px;box-shadow:var(--shadow);grid-column:1/-1">
        <h3 style="font-family:'Noto Serif TC',serif;font-size:15px;color:var(--blue);margin-bottom:16px">月度報價趨勢（近 6 個月）</h3>${mRows||'<p style="color:var(--ink3)">暫無資料</p>'}
      </div>
    </div>`;
}

// ── Stamp toggle ──────────────────────────────────────────────────
function toggleStamp(){
  const stamps = document.querySelectorAll('.print-stamp');
  const btn = document.getElementById('stampToggleBtn');
  if(!stamps.length) return;
  const visible = stamps[0].style.display !== 'none';
  stamps.forEach(s => s.style.display = visible ? 'none' : 'flex');
  if(btn) btn.textContent = visible ? '🔏 顯示印章' : '🔏 隱藏印章';
}

// ── Init ──────────────────────────────────────────────────────────
(async () => {
  await loadAll();
  renderList();
  updateBadges();
  document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('open'); }));
})();
</script>
